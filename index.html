<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ambient | 100 Sentiments Engine</title>
    
    <!-- Favicon Reference -->
    <link rel="icon" type="image/png" href="favicon.png">
    
    <!-- Premium Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@700;900&family=Playfair+Display:ital,wght@0,400..900;1,400..900&display=swap" rel="stylesheet">
    
    <!-- Tailwind CSS (Keep the CDN in HTML) -->
    <script src="https://cdn.tailwindcss.com"></script>
    
    <!-- External CSS -->
    <link rel="stylesheet" href="css/style.css">
</head>
<body class="min-h-screen flex items-center justify-center p-6 selection:bg-indigo-100 selection:text-indigo-900">

    <div class="ambient-container">
        <div class="noise-overlay"></div>
        <div id="orb-1" class="ambient-orb"></div>
        <div id="orb-2" class="ambient-orb"></div>
        <div id="orb-3" class="ambient-orb"></div>
        <div id="orb-4" class="ambient-orb"></div>
    </div>

    <main class="w-full max-w-4xl relative z-10">
        
        <nav class="flex flex-wrap justify-center gap-3 mb-12">
            <button data-cat="life" class="category-pill active px-6 py-3 rounded-full text-[10px] tracking-[0.3em] uppercase">Life Skills</button>
            <button data-cat="kindness" class="category-pill px-6 py-3 rounded-full text-[10px] tracking-[0.3em] uppercase">Kindness</button>
            <button data-cat="resilience" class="category-pill px-6 py-3 rounded-full text-[10px] tracking-[0.3em] uppercase">Resilience</button>
            <button data-cat="creative" class="category-pill px-6 py-3 rounded-full text-[10px] tracking-[0.3em] uppercase">Creative</button>
            <button data-cat="witty" class="category-pill px-6 py-3 rounded-full text-[10px] tracking-[0.3em] uppercase">Witty</button>
        </nav>

        <div class="glass-panel rounded-[5rem] p-10 md:p-24 text-center relative overflow-hidden">
            <div id="display-stage" class="text-stage enter min-h-[160px] flex items-center justify-center">
                <blockquote id="compliment-text" class="font-serif-quote text-3xl md:text-5xl italic leading-[1.3] ui-fixed-color">
                    Choose your focus for today. ✨
                </blockquote>
            </div>

            <div class="mt-14 flex flex-col items-center gap-10">
                <button id="gen-btn" class="w-full max-w-sm py-7 rounded-[2.5rem] font-black text-xs tracking-[0.5em] flex items-center justify-center gap-5 group uppercase">
                    <span>NEW COMPLIMENT</span>
                    <svg xmlns="http://www.w3.org/2000/svg" class="h-4 w-4 transition-transform duration-1000 group-hover:rotate-[360deg]" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="3" d="M4 4v5h.582m15.356 2A8.001 8.001 0 004.582 9m0 0H9m11 11v-5h-.581m0 0a8.003 8.003 0 01-15.357-2m15.357 2H15" />
                    </svg>
                </button>
                <div class="flex justify-center">
                    <button id="copy-btn" class="group flex flex-col items-center gap-3 text-slate-400 hover:text-slate-600 transition-all text-[10px] font-black tracking-widest uppercase">
                        <span class="px-10 py-4 rounded-2xl bg-white/40 hover:bg-white/90 transition-colors border border-white">COPY TO CLIPBOARD</span>
                    </button>
                </div>
            </div>
        </div>

        <footer class="mt-16 flex justify-between items-center opacity-40 px-12 text-slate-600">
            <div class="text-[8px] font-black tracking-[0.6em] uppercase">Liquid Mesh Atmosphere</div>
            <div class="text-[8px] font-black tracking-[0.6em] uppercase">v3.0.0 / High-Fidelity</div>
        </footer>
    </main>

    <div id="toast" class="fixed bottom-12 left-1/2 -translate-x-1/2 bg-slate-900 text-white px-10 py-5 rounded-3xl text-[10px] font-black tracking-widest uppercase opacity-0 translate-y-12 pointer-events-none transition-all duration-700 z-50 shadow-2xl">
        Sentiment Captured 📋
    </div>

    <!-- External JavaScript -->
    <script src="js/script.js"></script>
</body>
</html>
